    <style id="theme-vars">
/* Source: structured-spec — 红楼梦诗词检索站 · 水墨宣纸 · 黛蓝 + 朱砂 */
:root {
  /* === 语义化色彩（HSL，供画布主题映射 / Tailwind 使用） === */
  /* 背景 */
  --background: 42 50% 92%;          /* 宣纸底 #F5EFE1 */
  --card: 41 47% 88%;                /* 宣纸深一档 #EFE6D3 */
  --card-foreground: 0 0% 17%;
  --popover: 42 50% 92%;
  --popover-foreground: 0 0% 17%;

  /* 文字 */
  --foreground: 0 0% 17%;            /* 墨字 #2B2B2B */
  --muted-foreground: 30 10% 42%;    /* 淡墨，副文本 */

  /* 主色：黛蓝 */
  --primary: 208 36% 28%;            /* 黛蓝 #2E4A62 */
  --primary-foreground: 42 50% 92%;
  --secondary: 208 18% 90%;          /* 黛蓝淡晕，次级表面 */
  --secondary-foreground: 208 36% 28%;
  --muted: 42 26% 90%;               /* 宣纸淡面 */
  --accent: 8 59% 45%;               /* 朱砂 #B5402F（CTA / 印章） */
  --accent-foreground: 42 50% 92%;

  /* 状态 */
  --destructive: 8 59% 45%;
  --destructive-foreground: 42 50% 92%;

  /* 描边 */
  --border: 39 29% 78%;              /* 淡线 #D8CDB8 */
  --input: 39 29% 78%;
  --ring: 208 36% 28%;

  /* 图表色（黛蓝 / 朱砂 / 赭石系，备用） */
  --chart-1: 208 36% 28%;
  --chart-2: 8 59% 45%;
  --chart-3: 39 44% 42%;
  --chart-4: 205 42% 21%;
  --chart-5: 208 18% 60%;

  /* 侧栏（与卡片同系） */
  --sidebar: 41 47% 88%;
  --sidebar-foreground: 0 0% 17%;
  --sidebar-primary: 208 36% 28%;
  --sidebar-primary-foreground: 42 50% 92%;
  --sidebar-accent: 8 59% 45%;
  --sidebar-accent-foreground: 42 50% 92%;
  --sidebar-border: 39 29% 78%;
  --sidebar-ring: 208 36% 28%;

  /* === 品牌命名色（hex，供水墨 / 印章 / 点缀直接引用） === */
  --hl-paper: #F5EFE1;               /* 宣纸底 */
  --hl-paper-2: #EFE6D3;             /* 宣纸深一档 */
  --hl-ink: #2B2B2B;                 /* 墨字 */
  --hl-daiblue: #2E4A62;             /* 黛蓝 */
  --hl-daiblue-d: #1F3A4D;           /* 黛蓝加深 */
  --hl-cinnabar: #B5402F;            /* 朱砂 */
  --hl-ochre: #9C7A3C;               /* 赭石淡金 */
  --hl-line: #D8CDB8;                /* 淡线 */

  /* 字体 */
  --font-sans: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
  --font-serif: "Noto Serif SC", "KaiTi", "STKaiti", "STSong", serif;
  --font-mono: ui-monospace, "SFMono-Regular", monospace;

  /* 圆角（克制，贴合古典版面） */
  --radius: 4px;
  --hl-radius-sm: 4px;
  --hl-radius-md: 8px;
  --hl-radius-lg: 12px;
  --hl-radius-full: 9999px;

  /* 间距 */
  --spacing: 0.25rem;
  --tracking-normal: 0.02em;

  /* 阴影：静态表面以描边为主；浮起层轻微投影 */
  --shadow-color: hsl(208 36% 28%);
  --shadow-2xs: 0 1px 2px 0 hsl(208 36% 28% / 0.03);
  --shadow-xs: 0 1px 2px 0 hsl(208 36% 28% / 0.04);
  --shadow-sm: 0 1px 3px 0 hsl(208 36% 28% / 0.04), 0 1px 2px -1px hsl(208 36% 28% / 0.03);
  --shadow: 0 2px 6px -1px hsl(208 36% 28% / 0.05), 0 1px 3px -1px hsl(208 36% 28% / 0.04);
  --shadow-md: 0 4px 10px -2px hsl(208 36% 28% / 0.06), 0 2px 4px -1px hsl(208 36% 28% / 0.04);
  --shadow-lg: 0 8px 18px -4px hsl(208 36% 28% / 0.08), 0 3px 6px -2px hsl(208 36% 28% / 0.04);
  --shadow-xl: 0 14px 28px -6px hsl(208 36% 28% / 0.10), 0 6px 10px -4px hsl(208 36% 28% / 0.05);
  --shadow-2xl: 0 18px 36px -8px hsl(208 36% 28% / 0.12);
}

/* 暗色：夜读墨色模式 */
.dark {
  --background: 205 30% 10%;
  --card: 205 26% 13%;
  --card-foreground: 42 24% 88%;
  --popover: 205 28% 11%;
  --popover-foreground: 42 24% 88%;
  --foreground: 42 24% 88%;
  --muted-foreground: 39 14% 62%;
  --primary: 205 34% 58%;
  --primary-foreground: 205 30% 10%;
  --secondary: 205 20% 20%;
  --secondary-foreground: 42 24% 88%;
  --muted: 205 20% 18%;
  --accent: 8 64% 58%;
  --accent-foreground: 205 30% 10%;
  --destructive: 8 64% 58%;
  --destructive-foreground: 42 24% 88%;
  --border: 205 14% 22%;
  --input: 205 14% 22%;
  --ring: 205 34% 58%;
  --sidebar: 205 26% 13%;
  --sidebar-foreground: 42 24% 88%;
  --sidebar-primary: 205 34% 58%;
  --sidebar-primary-foreground: 205 30% 10%;
  --sidebar-accent: 8 64% 58%;
  --sidebar-accent-foreground: 205 30% 10%;
  --sidebar-border: 205 14% 22%;
  --sidebar-ring: 205 34% 58%;
}

body {
  letter-spacing: var(--tracking-normal);
  /* 宣纸纹理：多层径向渐变模拟纸纤维 + 微噪点 */
  background-color: hsl(var(--background));
  background-image:
    radial-gradient(circle at 18% 22%, hsl(39 44% 42% / 0.035) 0, transparent 38%),
    radial-gradient(circle at 82% 78%, hsl(208 36% 28% / 0.04) 0, transparent 42%),
    radial-gradient(circle at 50% 50%, hsl(0 0% 100% / 0.25) 0, transparent 60%);
}

    <style>
      .hl-container {
        max-width: 1140px;
        margin-inline: auto;
        padding-inline: 1.5rem;
      }
      .hl-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background-color: hsl(var(--background) / 0.92);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--hl-line);
      }
      .hl-nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        height: 64px;
      }
      .hl-seal-logo {
        display: inline-flex;
        align-items: center;
        gap: 0.625rem;
        text-decoration: none;
      }
      .hl-seal-stamp {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        background-color: var(--hl-cinnabar);
        color: var(--hl-paper);
        font-family: var(--font-serif);
        font-size: 1.375rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0;
        border-radius: var(--hl-radius-sm);
        box-shadow:
          inset 0 0 0 1px hsl(var(--accent) / 0.25),
          inset 0 1px 3px hsl(var(--primary) / 0.08);
        user-select: none;
        flex-shrink: 0;
      }
      .hl-seal-name {
        font-family: var(--font-serif);
        font-size: 1.0625rem;
        font-weight: 600;
        color: var(--hl-daiblue);
        letter-spacing: var(--tracking-normal);
        white-space: nowrap;
      }
      .hl-nav-desktop {
        display: none;
        align-items: center;
        gap: 0.25rem;
      }
      .hl-nav-link {
        position: relative;
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 1rem;
        font-family: var(--font-sans);
        font-size: 0.9375rem;
        color: hsl(var(--muted-foreground));
        text-decoration: none;
        border-radius: var(--hl-radius-sm);
        transition: color 0.2s ease;
      }
      .hl-nav-link:hover { color: var(--hl-daiblue); }
      .hl-nav-link:focus-visible {
        outline: 2px solid var(--hl-daiblue);
        outline-offset: 2px;
        border-radius: var(--hl-radius-sm);
      }
      .hl-nav-link[data-active="true"] {
        color: var(--hl-daiblue);
        font-weight: 600;
      }
      .hl-nav-link[data-active="true"]::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 1rem;
        right: 1rem;
        height: 2px;
        background-color: var(--hl-daiblue);
        border-radius: 1px;
      }
      .hl-nav-link[data-active="true"]::before {
        content: "";
        position: absolute;
        top: 0.25rem;
        left: 50%;
        transform: translateX(-50%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: var(--hl-cinnabar);
      }
      .hl-mobile-menu { position: relative; }
      .hl-mobile-trigger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        cursor: pointer;
        border-radius: var(--hl-radius-sm);
        list-style: none;
        transition: background-color 0.2s ease;
      }
      .hl-mobile-trigger::-webkit-details-marker { display: none; }
      .hl-mobile-trigger:hover { background-color: hsl(var(--secondary)); }
      .hl-mobile-trigger:focus-visible {
        outline: 2px solid var(--hl-daiblue);
        outline-offset: 2px;
      }
      .hl-mobile-icon { width: 22px; height: 22px; color: var(--hl-daiblue); }
      .hl-nav-mobile {
        position: absolute;
        top: calc(100% + 0.5rem);
        right: 0;
        min-width: 180px;
        display: flex;
        flex-direction: column;
        gap: 0.125rem;
        padding: 0.5rem;
        background-color: var(--hl-paper);
        border: 1px solid var(--hl-line);
        border-radius: var(--hl-radius-md);
        box-shadow: var(--shadow-md);
      }
      .hl-mobile-link {
        display: block;
        padding: 0.625rem 0.875rem;
        font-family: var(--font-sans);
        font-size: 0.9375rem;
        color: hsl(var(--muted-foreground));
        text-decoration: none;
        border-radius: var(--hl-radius-sm);
        transition: color 0.2s ease, background-color 0.2s ease;
      }
      .hl-mobile-link:hover {
        color: var(--hl-daiblue);
        background-color: hsl(var(--secondary));
      }
      .hl-mobile-link:focus-visible {
        outline: 2px solid var(--hl-daiblue);
        outline-offset: 2px;
      }
      .hl-mobile-link[data-active="true"] {
        color: var(--hl-daiblue);
        font-weight: 600;
        background-color: hsl(var(--secondary));
      }
      @media (min-width: 768px) {
        .hl-nav-desktop { display: flex; }
        .hl-mobile-menu { display: none; }
      }
      .hl-footer {
        margin-top: 4rem;
        padding-top: 2.5rem;
        padding-bottom: 1.5rem;
        border-top: 1px solid var(--hl-line);
      }
      .hl-footer-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .hl-footer-title {
        font-family: var(--font-serif);
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--hl-daiblue);
        margin: 0 0 0.5rem 0;
        letter-spacing: var(--tracking-normal);
      }
      .hl-footer-text {
        font-family: var(--font-sans);
        font-size: 0.8125rem;
        line-height: 1.6;
        color: hsl(var(--muted-foreground));
        margin: 0;
      }
      .hl-footer-bottom {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        margin-top: 2rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--hl-line);
      }
      .hl-footer-dot {
        flex-shrink: 0;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: var(--hl-ochre);

    <script src="../assets/poems-data.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var poemId = params.get('poem') || 'zanghua';
        var POEMS = window.HL_POEMS || {};
        var poem = POEMS[poemId];
        if (!poem) { poemId = Object.keys(POEMS)[0]; poem = POEMS[poemId]; }

        // 标题 → id 反查表（延伸互链用）
        var titleToId = {};
        Object.keys(POEMS).forEach(function (id) { titleToId[POEMS[id].title] = id; });

        // 文档标题
        document.title = poem.title + ' · 红楼梦诗词检索站';

        // 面包屑
        document.getElementById('crumb-title').textContent = poem.title;

        // 横幅
        var bannerImg = document.getElementById('banner-img');
        if (bannerImg) bannerImg.alt = '水墨横幅 · ' + poem.title;
        document.getElementById('banner-title').textContent = poem.title;
        document.getElementById('banner-type').textContent = poem.type;
        document.getElementById('banner-author').textContent = poem.author;
        document.getElementById('banner-chapter').textContent = poem.chapter;
        var verShort = (poem.version || '').split('（')[0].trim() || poem.version || '';
        document.getElementById('banner-version').textContent = verShort;

        // 壹 · 原文（处理含换行的条目，如诔文）
        var secOriginal = document.getElementById('sec-original');
        (poem.original || []).forEach(function (line) {
          line.split('\n').forEach(function (sub) {
            sub = sub.trim();
            if (sub) {
              var p = document.createElement('p');
              p.textContent = sub;
              secOriginal.appendChild(p);
            }
          });
        });

        // 贰 · 白话译文
        var secTranslation = document.getElementById('sec-translation');
        (poem.translation || []).forEach(function (para) {
          var p = document.createElement('p');
          p.textContent = para;
          secTranslation.appendChild(p);
        });

        // 叁 · 注释
        var secGloss = document.getElementById('sec-gloss');
        (poem.gloss || []).forEach(function (g) {
          var row = document.createElement('div');
          row.className = 'hl-gloss-row';
          var dt = document.createElement('dt');
          dt.textContent = g.term;
          var dd = document.createElement('dd');
          dd.textContent = g.note;
          row.appendChild(dt);
          row.appendChild(dd);
          secGloss.appendChild(row);
        });

        // 肆 · 赏析（首段后插入引文）
        var secAnalysis = document.getElementById('sec-analysis');
        (poem.analysis || []).forEach(function (para, i) {
          var p = document.createElement('p');
          p.textContent = para;
          secAnalysis.appendChild(p);
          if (i === 0 && poem.pullquote) {
            var bq = document.createElement('blockquote');
            bq.className = 'hl-pullquote';
            var qp = document.createElement('p');
            qp.textContent = poem.pullquote;
            bq.appendChild(qp);
            secAnalysis.appendChild(bq);
          }
        });

        // 伍 · 延伸互链
        var secRelated = document.getElementById('sec-related');
        (poem.related || []).forEach(function (r, i) {
          var a = document.createElement('a');
          a.className = 'hl-rel-card';
          var firstTitle = (r.titles || '').split('·')[0].trim();
          var targetId = titleToId[firstTitle];
          a.href = targetId
            ? ('poem-detail.html?poem=' + targetId)
            : ('search.html?keyword=' + encodeURIComponent(firstTitle));
          if (i < 2) a.setAttribute('data-dom-id', 'related-poem-' + (i + 1));
          var lab = document.createElement('span');
          lab.className = 'hl-rel-label';
          lab.textContent = r.label;
          var tit = document.createElement('span');
          tit.className = 'hl-rel-titles';
          tit.textContent = r.titles;
          a.appendChild(lab);
          a.appendChild(tit);
          secRelated.appendChild(a);
        });

        // 版本声明
        document.getElementById('version-note').textContent = '本首所依版本：' + (poem.version || '');
      })();
    </script>
